version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "Europe/London"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "github-actions"
    open-pull-requests-limit: 5
